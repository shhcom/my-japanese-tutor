<!-- 🏆 [1단원] 화면 구성 및 디자인 (HTML & CSS) 🏆 -->
<!-- ================================================== -->
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>이즈의 일본어 튜터</title>
    <style>
        /* 🎨 1. 기본 배경 및 폰트 */
        body { margin: 0; padding: 0; background-color: #121212; color: #e0e0e0; font-family: 'Apple SD Gothic Neo', sans-serif; height: 100vh; overflow: hidden; }
        .screen { display: none; flex-direction: column; height: 100vh; }
        .active-screen { display: flex; } 
        
        /* 🎨 2. 상단 헤더 */
        header { text-align: center; padding: 20px; font-size: 1.2rem; font-weight: bold; background-color: #1e1e1e; display: flex; justify-content: space-between; align-items: center; }
        .back-btn { background: none; border: none; color: #aaa; font-size: 1rem; font-weight: bold; cursor: pointer; padding: 0; }
        .back-btn:hover { color: #fff; }
        
        /* 🎨 3. 중앙 컨테이너 (문제 나오는 곳) */
        .center-container { flex: 1; display: flex; justify-content: center; align-items: center; flex-direction: column; padding: 20px; width: 100%; box-sizing: border-box; }
        
        /* 💡 4. 퀴즈 방향 선택 스위치 (일->한 / 한->일) */
        .direction-toggle-container { display: flex; background-color: #1e1e1e; border-radius: 10px; margin-bottom: 25px; border: 1px solid #333; overflow: hidden; }
        .direction-btn { padding: 10px 15px; font-size: 0.95rem; font-weight: bold; border: none; background: none; color: #aaa; cursor: pointer; transition: 0.3s; }
        .direction-btn.active { background-color: #bb86fc; color: #121212; }

        /* 🎨 5. 문제 텍스트 스타일 */
        .meaning-hint { font-size: 1.2rem; color: #bb86fc; margin-bottom: 10px; font-weight: bold; text-align: center; }
        .japanese-char { font-weight: bold; color: #ffffff; text-shadow: 0 4px 15px rgba(255, 255, 255, 0.15); margin-bottom: 15px; text-align: center; word-break: keep-all; line-height: 1.2; width: 100%; }

        /* 💡 6. 발음 듣기(TTS) 버튼 (여/남 디자인 분리) */
        .tts-container { display: flex; gap: 15px; margin-bottom: 15px; }
        .tts-btn { padding: 10px 20px; font-size: 1.1rem; background-color: #333; border-radius: 20px; cursor: pointer; transition: 0.2s; font-weight: bold; }
        .tts-btn.female { color: #03dac6; border: 1px solid #03dac6; }
        .tts-btn.female:hover { background-color: #03dac6; color: #121212; }
        .tts-btn.male { color: #bb86fc; border: 1px solid #bb86fc; }
        .tts-btn.male:hover { background-color: #bb86fc; color: #121212; }

        /* 🎨 7. 학습 범위 태그 */
        .range-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 25px; max-width: 350px; }
        .range-tag { padding: 8px 12px; border-radius: 20px; border: 1px solid #bb86fc; color: #bb86fc; cursor: pointer; transition: 0.2s; font-size: 0.9rem; font-weight: bold; }
        .range-tag.active { background-color: #bb86fc; color: #121212; }

        /* 🎨 8. 메인 메뉴 버튼 */
        .menu-btn { padding: 15px 30px; font-size: 1.2rem; font-weight: bold; margin: 8px; background-color: #1e1e1e; color: #e0e0e0; border: 2px solid #bb86fc; border-radius: 15px; cursor: pointer; width: 260px; transition: 0.2s; }
        .menu-btn:hover { background-color: #bb86fc; color: #121212; }
        .menu-btn.word-mode { border-color: #03dac6; color: #03dac6; }
        .menu-btn.word-mode:hover { background-color: #03dac6; color: #121212; }
        .menu-btn.sentence-mode { border-color: #ff9800; color: #ff9800; }
        .menu-btn.sentence-mode:hover { background-color: #ff9800; color: #121212; }

        /* 🎨 9. 정답 선택 버튼 (4지선다) */
        .button-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; margin-bottom: 10px; width: 100%; box-sizing: border-box; }
        .option-btn { padding: 15px 10px; font-size: 1.1rem; font-weight: bold; border: 1px solid #333; border-radius: 15px; background-color: #2c2c2c; color: #ffffff; cursor: pointer; transition: all 0.2s ease; word-break: keep-all; line-height: 1.3; }
        .option-btn:active { transform: scale(0.95); }
        .option-btn:disabled { cursor: not-allowed; opacity: 0.8; }
        .correct { background-color: #4CAF50 !important; color: white !important; border-color: #4CAF50 !important; }
        .wrong { background-color: #F44336 !important; color: white !important; border-color: #F44336 !important; }
        
        /* 🎨 10. 팝업 모달 (획순 보기) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.8); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background-color: #1e1e1e; padding: 30px; border-radius: 15px; text-align: center; position: relative; box-shadow: 0 4px 20px rgba(0,0,0,0.5); border: 1px solid #333; }
        .modal-title { font-size: 1.2rem; margin-bottom: 15px; font-weight: bold; color: #fff; }
        .close-btn { position: absolute; top: 10px; right: 15px; color: #aaa; font-size: 28px; font-weight: bold; cursor: pointer; }
        .close-btn:hover { color: #fff; }
    </style>
</head>
<body>

    <!-- 🏠 1. 메인 화면 시작 -->
    <div id="mainScreen" class="screen active-screen">
        <header style="justify-content: center;">이즈의 일본어 튜터</header>
        <div class="center-container">
            
            <!-- 💡 퀴즈 출제 방향 설정 -->
            <div style="margin-bottom: 8px; color: #aaa; font-size: 0.9rem;">퀴즈 출제 방식</div>
            <div class="direction-toggle-container">
                <button id="dirJpToKr" class="direction-btn active" onclick="setDirection('jp_to_kr')">🇯🇵 일 ➔ 🇰🇷 한</button>
                <button id="dirKrToJp" class="direction-btn" onclick="setDirection('kr_to_jp')">🇰🇷 한 ➔ 🇯🇵 일</button>
            </div>

            <!-- 💡 학습 범위 설정 -->
            <div style="margin-bottom: 10px; color: #aaa; font-size: 0.9rem;">학습할 범위를 껐다 켤 수 있어!</div>
            <div class="range-grid">
                <div class="range-tag active" onclick="toggleRange('아행', this)">아행</div>
                <div class="range-tag active" onclick="toggleRange('카행', this)">카행</div>
                <div class="range-tag active" onclick="toggleRange('사행', this)">사행</div>
                <div class="range-tag active" onclick="toggleRange('타행', this)">타행</div>
                <div class="range-tag active" onclick="toggleRange('나행', this)">나행</div>
                <div class="range-tag" onclick="toggleRange('하행', this)">하행</div>
                <div class="range-tag" onclick="toggleRange('마행', this)">마행</div>
                <div class="range-tag" onclick="toggleRange('야행', this)">야행</div>
                <div class="range-tag" onclick="toggleRange('라행', this)">라행</div>
                <div class="range-tag" onclick="toggleRange('와행', this)">와행(응)</div>
                <div class="range-tag active" onclick="toggleRange('회화', this)">기초 인사</div>
            </div>

            <!-- 💡 학습 모드 선택 버튼 -->
            <button class="menu-btn" onclick="startGame('hiragana')">あ 히라가나 낱글자</button>
            <button class="menu-btn" onclick="startGame('katakana')">ア 가타카나 낱글자</button>
            <button class="menu-btn word-mode" onclick="startGame('word')">🍎 교재 속 단어 퀴즈</button>
            <button class="menu-btn sentence-mode" onclick="startGame('sentence')">💬 생활 회화 퀴즈</button>
        </div>
    </div>
    <!-- 메인 화면 끝 -->

    <!-- 📝 2. 퀴즈 화면 시작 -->
    <div id="quizScreen" class="screen">
        <header>
            <button class="back-btn" onclick="goHome()">◀ 홈으로</button>
            <span id="quizTitle">일본어 퀴즈</span>
            <span class="score-board" id="score">0 / 0</span>
        </header>

        <div class="center-container">
            <div id="meaningHint" class="meaning-hint"></div>
            <div class="japanese-char" id="questionText">あ</div>
            
            <!-- 💡 발음 듣기 남/여 분리 버튼 -->
            <div class="tts-container">
                <button class="tts-btn female" onclick="playTTS('female')">👩🏻 여자 발음</button>
                <button class="tts-btn male" onclick="playTTS('male')">👦🏻 남자 발음</button>
            </div>
            
            <!-- 획순 보기 버튼 -->
            <button id="hintBtn" onclick="showStrokeOrder()" style="padding: 10px 20px; background-color: #333; color: #bb86fc; border: 1px solid #bb86fc; border-radius: 20px; cursor: pointer; font-weight: bold;">획순 보기 ✍️</button>
        </div>

        <!-- 💡 4지선다 보기 버튼 -->
        <div class="button-grid">
            <button class="option-btn" onclick="checkAnswer(0)" id="btn0"></button>
            <button class="option-btn" onclick="checkAnswer(1)" id="btn1"></button>
            <button class="option-btn" onclick="checkAnswer(2)" id="btn2"></button>
            <button class="option-btn" onclick="checkAnswer(3)" id="btn3"></button>
        </div>
    </div>
    <!-- 퀴즈 화면 끝 -->

    <!-- 🖼️ 3. 획순 보기 팝업창 -->
    <div id="strokeModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeStrokeOrder()">&times;</span>
            <div class="modal-title" id="modalTitle">쓰는 순서</div>
            <img id="strokeImage" src="" alt="획순 이미지" style="width: 150px; height: 150px; background-color: white; border-radius: 10px;">
        </div>
    </div>

        // ⚙️ 5. 게임 상태 변수 모음

        // 기본으로 켜둘 학습 범위 설정 (회화 포함)
        let selectedRanges = ['아행', '카행', '사행', '타행', '나행', '회화'];
        
        // 💡 퀴즈 출제 방향 (기본값: 일본어 -> 한국어)
        let quizDirection = 'jp_to_kr'; 

        // 🔄 6. 퀴즈 방향 변경 로직
        function setDirection(dir) {
            quizDirection = dir;
            document.getElementById('dirJpToKr').classList.remove('active');
            document.getElementById('dirKrToJp').classList.remove('active');
            
            if(dir === 'jp_to_kr') {
                document.getElementById('dirJpToKr').classList.add('active');
            } else {
                document.getElementById('dirKrToJp').classList.add('active');
            }
        }

        // 🎛️ 7. 태그 클릭 시 학습 범위 껐다 켜기
        function toggleRange(rangeName, element) {
            if (selectedRanges.includes(rangeName)) {
                if (selectedRanges.length === 1) {
                    alert('최소 하나의 범위는 선택하고 공부해야지!');
                    return;
                }
                selectedRanges = selectedRanges.filter(r => r !== rangeName);
                element.classList.remove('active');
            } else {
                selectedRanges.push(rangeName);
                element.classList.add('active');
            }
        }

        // 🚀 8. 게임 시작 및 데이터 필터링
        function startGame(mode) {
            currentMode = mode;
            document.getElementById('mainScreen').classList.remove('active-screen');
            document.getElementById('quizScreen').classList.add('active-screen');

            let baseData = [];
            if (mode === 'hiragana') {
                document.getElementById('quizTitle').innerText = '히라가나 낱글자';
                baseData = hiraganaData;
            } else if (mode === 'katakana') {
                document.getElementById('quizTitle').innerText = '가타카나 낱글자';
                baseData = katakanaData;
            } else if (mode === 'word') {
                document.getElementById('quizTitle').innerText = '단어 퀴즈';
                baseData = wordData;
            } else if (mode === 'sentence') { 
                document.getElementById('quizTitle').innerText = '생활 회화 퀴즈';
                baseData = sentenceData;
            }

            // 선택한 태그에 맞는 데이터만 쏙쏙 뽑아오기
            currentModeData = baseData.filter(item => {
                let itemRow = item.row || item.path.split('/')[1]; 
                if (!itemRow && item.answer === '응') itemRow = '와행';
                return selectedRanges.includes(itemRow);
            });

            if (currentModeData.length === 0) {
                alert('앗, 선택한 범위에 해당하는 문제가 없어! 메인 화면에서 태그를 더 켜봐.');
                goHome();
                return;
            }

            initGame();
        }

        // 🏠 9. 홈으로 돌아가기
        function goHome() {
            document.getElementById('quizScreen').classList.remove('active-screen');
            document.getElementById('mainScreen').classList.add('active-screen');
        }

        // 🔀 10. 배열 섞기 (랜덤 마법)
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // 🎬 11. 퀴즈 초기화 세팅
        function initGame() {
            quizData = [...currentModeData]; 
            shuffleArray(quizData); 
            currentQuizIndex = 0;
            score = 0;
            loadQuiz();
        }

        // 📺 12. 화면에 문제 띄우기 (스마트 폰트 조절 & 방향 전환 적용)
        function loadQuiz() {
            const currentQuiz = quizData[currentQuizIndex];
            isFirstTry = true; 
            
            let displayQuestion = "";
            let displayOptions = [];

            // 💡 퀴즈 방향에 따라 문제와 보기를 다르게 세팅!
            if (quizDirection === 'jp_to_kr') {
                // 🇯🇵 일본어 보고 -> 🇰🇷 한국어 뜻 맞추기
                displayQuestion = currentQuiz.question;
                displayOptions = [...currentQuiz.options];
                
                if (currentMode === 'word' || currentMode === 'sentence') {
                    document.getElementById('meaningHint').innerText = currentMode === 'sentence' ? "이 문장의 뜻은?" : "이 단어의 뜻은?";
                    document.getElementById('hintBtn').style.display = 'none';
                } else {
                    document.getElementById('meaningHint').innerText = "";
                    document.getElementById('hintBtn').style.display = 'inline-block';
                }
            } else {
                // 🇰🇷 한국어 뜻 보고 -> 🇯🇵 일본어 맞추기
                displayQuestion = currentQuiz.answer;
                displayOptions.push(currentQuiz.question); // 정답 하나 넣고
                
                // 오답 3개는 현재 범위의 다른 데이터에서 무작위로 추출
                let wrongChoices = currentModeData.filter(item => item.question !== currentQuiz.question);
                shuffleArray(wrongChoices);
                for(let i = 0; i < 3 && i < wrongChoices.length; i++) {
                    displayOptions.push(wrongChoices[i].question);
                }
                
                if (currentMode === 'word' || currentMode === 'sentence') {
                    document.getElementById('meaningHint').innerText = currentMode === 'sentence' ? "이 뜻을 가진 일본어 문장은?" : "이 뜻을 가진 일본어 단어는?";
                    document.getElementById('hintBtn').style.display = 'none';
                } else {
                    document.getElementById('meaningHint').innerText = "이 소리를 내는 일본어 글자는?";
                    document.getElementById('hintBtn').style.display = 'inline-block';
                }
            }

            const questionEl = document.getElementById('questionText');
            questionEl.innerText = displayQuestion;
            
            // 💡 스마트 글자 크기 자동 조절 (한글/일본어 상관없이 길이에 맞춰서 예쁘게!)
            const textLen = displayQuestion.length;
            if (textLen === 1) questionEl.style.fontSize = '6rem';
            else if (textLen <= 3) questionEl.style.fontSize = '4.5rem';
            else if (textLen <= 5) questionEl.style.fontSize = '3rem';
            else if (textLen <= 7) questionEl.style.fontSize = '2.2rem';
            else questionEl.style.fontSize = '1.8rem';
            
            // 보기 4개를 섞어서 버튼에 넣기
            shuffleArray(displayOptions);

            for (let i = 0; i < 4; i++) {
                const btn = document.getElementById('btn' + i);
                btn.innerText = displayOptions[i]; 
                btn.dataset.originalText = displayOptions[i]; 
                btn.classList.remove('correct', 'wrong');
                btn.disabled = false;
                btn.style.opacity = '1';
            }
            
            document.getElementById('score').innerText = `${score} / ${quizData.length}`;
        }

        // ✅ 13. 정답 채점 로직
        function checkAnswer(selectedIndex) {
            const currentQuiz = quizData[currentQuizIndex];
            const selectedBtn = document.getElementById('btn' + selectedIndex);
            const selectedText = selectedBtn.dataset.originalText; 

            // 방향에 따라 정답 비교 대상이 달라짐!
            const correctAnswer = (quizDirection === 'jp_to_kr') ? currentQuiz.answer : currentQuiz.question;

            if (selectedText === correctAnswer) {
                selectedBtn.classList.add('correct');
                if (isFirstTry) score++; 

                for (let i = 0; i < 4; i++) {
                    document.getElementById('btn' + i).disabled = true; 
                }

                document.getElementById('score').innerText = `${score} / ${quizData.length}`;

                setTimeout(() => {
                    currentQuizIndex++;
                    if (currentQuizIndex < quizData.length) {
                        loadQuiz();
                    } else {
                        document.getElementById('score').innerText = `${score} / ${quizData.length}`;
                        alert(`퀴즈 끝! 총 ${quizData.length}문제 중 ${score}문제를 맞췄네. 메인으로 돌아갈게!`);
                        goHome(); 
                    }
                }, 800);

            } else {
                selectedBtn.classList.add('wrong');
                selectedBtn.disabled = true; 
                isFirstTry = false; 
            }
        }

        // 🔊 14. 원어민 발음 읽어주기 (남/여 선택 마법)
        function playTTS(gender) {
            // 방향 상관없이 읽어야 할 텍스트는 무조건 '일본어 원문'
            const textToRead = quizData[currentQuizIndex].question; 
            
            const utterance = new SpeechSynthesisUtterance(textToRead);
            utterance.lang = 'ja-JP'; 
            utterance.rate = 0.85; // 초보자가 듣기 좋게 살짝 천천히
            
            const voices = window.speechSynthesis.getVoices();
            const jpVoices = voices.filter(voice => voice.lang.includes('ja'));
            
            if (jpVoices.length > 0) {
                let selectedVoice = null;

                if (gender === 'female') {
                    // 아이폰 대표 여자 성우(Kyoko) 또는 female 포함 목소리 찾기
                    selectedVoice = jpVoices.find(voice => voice.name.includes('Kyoko') || voice.name.toLowerCase().includes('female'));
                } else if (gender === 'male') {
                    // 아이폰 대표 남자 성우(Otoya, Osamu) 또는 male 포함 목소리 찾기
                    selectedVoice = jpVoices.find(voice => voice.name.includes('Otoya') || voice.name.includes('Osamu') || (voice.name.toLowerCase().includes('male') && !voice.name.toLowerCase().includes('female')));
                }
                
                // 선택한 성우가 기기에 없으면 기본 첫 번째 성우로 자동 재생
                utterance.voice = selectedVoice || jpVoices[0];
            }
            
            window.speechSynthesis.speak(utterance);
        }

        // ✍️ 15. 획순 보기 팝업 제어
        function showStrokeOrder() {
            const currentQuiz = quizData[currentQuizIndex];
            document.getElementById('modalTitle').innerText = `${currentQuiz.question} 쓰는 순서`;
            document.getElementById('strokeImage').src = `${currentQuiz.path}/${currentQuiz.question}.gif`;
            document.getElementById('strokeModal').style.display = 'flex';
        }

        function closeStrokeOrder() {
            document.getElementById('strokeModal').style.display = 'none';
        }
    </script>
</body>
